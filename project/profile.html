<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Zahra Medical</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
    <script src="https://kit.fontawesome.com/e9d0cce3b5.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="profile.js" defer></script>
</head>

<body>
    <header>
        <img src="img/LOGO-01 big.png" alt="Zahr Medical Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="reservation.html">Reservation</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="#"><b>My Profile</b></a></li>
            </ul>
        </nav>
    </header>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-info">
                <h2 id="display-name">Loading...</h2>
                <p>Member since 2025</p>
            </div>
        </div>

        <form>
            <div class="info-group">
                <label>Username</label>
                <input type="text" id="profile-username" readonly>
            </div>
            <div class="info-group">
                <label>Full Name</label>
                <input type="text" id="profile-fullname" readonly>
            </div>
            <div class="info-group">
                <label>Email</label>
                <input type="email" id="profile-email" readonly>
            </div>
            <div class="info-group">
                <label>Phone Number</label>
                <input type="text" id="profile-phone" readonly>
            </div>
            <div class="info-group">
                <label>Security Question</label>
                <input type="text" id="profile-question" readonly>
            </div>
        </form>

        <a href="Login.html" class="security-link"><i class="fas fa-key"></i> Change Password / Security Settings</a>
        <br>
        <a href="#" class="btn-logout" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <footer class="footer">
        <div class="fcontainer" style="margin: 2rem; padding-top: 20px;">
            <div class="copyright" style="text-align: center; color: white;">
                <p>&copy; 2025 Zahra Medical. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
