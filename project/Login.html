<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="login.js"></script>
  <link rel="stylesheet" href="login.css" />

  <link rel="icon" href="img/LOGO EN pur.png" type="image/x-icon">
  <script src="https://kit.fontawesome.com/e9d0cce3b5.js" crossorigin="anonymous"></script>
  <title>Sign in / Sign up</title>
</head>

<body>
  <div class="container">
    <div class="forms-container">
      <div class="signin-signup">

        <!-- Sign In Form -->
        <form action="#" class="sign-in-form">
          <h2 class="title">Sign in</h2>
          <div class="input-field">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Username" id="signin-user" required />
          </div>
          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Password" id="signin-pass" required />
          </div>

          <p class="social-text"><a href="#" id="forgot-pass-link" style="color: #444; font-size: 0.9rem;">Change
              Password?</a></p>

          <p id="signin-error" class="error-msg"></p>


          <input type="submit" value="Login" class="btn solid" />

          <p class="social-text">Find us on social platforms</p>
          <div class="social-media">
            <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
            <a href="https://www.linkedin.com/company/zahratrade/" class="social-icon"><i
                class="fab fa-linkedin-in"></i></a>
          </div>
        </form>

        <!-- Change Password Form -->
        <form action="#" class="change-password-form" style="display: none;">
          <h2 class="title">Change Password</h2>
          <div class="input-field">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Username" id="change-user" required />
          </div>
          <div class="input-field">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" id="change-email" required />
          </div>
          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="New Password" id="change-pass" required />
            <i class="fas fa-eye eye-icon "></i>
          </div>

          <div class="input-field">
            <i class="fas fa-question-circle"></i>
            <select id="change-question" required>
              <option value="" disabled selected>Select Security Question</option>
              <option value="pet">What is your first pet's name?</option>
              <option value="school">What remains your first school?</option>
              <option value="city">In what city were you born?</option>
            </select>
          </div>
          <div class="input-field">
            <i class="fas fa-key"></i>
            <input type="text" placeholder="Security Answer" id="change-answer" required />
          </div>

          <p id="change-error" class="error-msg"></p>

          <input type="submit" value="Change" class="btn solid" />
          <button type="button" class="btn transparent" id="cancel-change-btn"
            style="background-color: #777; width: 100px; height: 40px; margin-top: 5px;">Cancel</button>
        </form>

        <!-- Sign Up Form -->
        <form action="#" class="sign-up-form">
          <h2 class="title">Sign up</h2>
          <div class="input-field">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Username" id="signup-user" required maxlength="50" />
          </div>
          <div class="input-field">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" id="signup-email" required />
          </div>

          <div class="input-field">
            <i class="fas fa-user-tag"></i>
            <input type="text" placeholder="Full Name" id="signup-name" required />
          </div>
          <div class="input-field">
            <i class="fas fa-phone"></i>
            <input type="tel" placeholder="Phone Number" id="signup-phone" required />
          </div>

          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Password" id="signup-pass" required />
            <i class="fas fa-eye eye-icon "></i>
          </div>

          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Confirm Password" id="signup-pass2" required />
          </div>

          <div class="input-field">
            <i class="fas fa-question-circle"></i>
            <select id="signup-question" required>
              <option value="" disabled selected>Select Security Question</option>
              <option value="pet">What is your first pet's name?</option>
              <option value="school">What remains your first school?</option>
              <option value="city">In what city were you born?</option>
            </select>
          </div>
          <div class="input-field">
            <i class="fas fa-key"></i>
            <input type="text" placeholder="Security Answer" id="signup-answer" required />
          </div>

          <p id="signup-error" class="error-msg"></p>

          <input type="submit" class="btn" value="Sign up" />

          <p class="social-text">Find us on social platforms</p>
          <div class="social-media">
            <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
            <a href="https://www.linkedin.com/company/zahratrade/" class="social-icon"><i
                class="fab fa-linkedin-in"></i></a>
          </div>
        </form>
      </div>
    </div>

    <div class="panels-container">
      <div class="panel left-panel">
        <div class="content">
          <h3>New here ?</h3>
          <p>Join us what are you waiting for.</p>
          <button class="btn transparent" id="sign-up-btn">Sign up</button>
        </div>
        <img src="img/LOGO EN WHITE.png" class="image" alt="" />
      </div>
      <div class="panel right-panel">
        <div class="content">

          <h3>One of us ?</h3>
          <p>You were missed don't be late again..</p>
          <button class="btn transparent" id="sign-in-btn">Sign in</button>
        </div>
        <img src="img/LOGO EN WHITE.png" class="image" alt="" />

      </div>
    </div>
  </div>
</body>

</html>
