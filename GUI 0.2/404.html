<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>404 - Page Not Found | Zahra Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="js/tailwind-config.js"></script>
    <link href="css/global.css" rel="stylesheet" />
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-['Plus_Jakarta_Sans'] min-h-screen flex items-center justify-center p-6 text-on-surface">
    <div class="max-w-md w-full text-center">
        <!-- Icon/Visual -->
        <div class="relative mb-12">
            <div class="absolute inset-0 bg-gradient-to-r from-[#7d125e] to-[#9b2f77] blur-3xl opacity-20 transform scale-150"></div>
            <div class="relative flex justify-center">
                <span class="material-symbols-outlined text-9xl text-[#7d125e] animate-pulse">settings</span>
                <div class="absolute -bottom-2 -right-2 bg-error text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">ERROR 404</div>
            </div>
        </div>

        <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white mb-4 tracking-tight">System Anomaly Detected</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-10 leading-relaxed">
            We couldn't locate the clinical resource you were looking for. The link may be broken or the page has been decommissioned.
        </p>

        <div class="space-y-4">
            <a href="index.html" class="w-full clinical-gradient text-white py-4 px-8 rounded-xl font-bold flex items-center justify-center gap-2 hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
                <span class="material-symbols-outlined">home</span>
                Return to Dashboard Overview
            </a>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Zahra Medical Operational Integrity</p>
        </div>
    </div>
</body>
</html>
